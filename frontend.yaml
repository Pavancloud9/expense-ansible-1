- name: Configure frontend
  hosts: frontend
  become: yes
  tasks:
  - name: install nginx
    ansible.builtin.package:
      name: nginx
      state: installed

  - name: start and enable nginx service
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes

  - name: Remove default index.html
    ansible.builtin.file:
      path: /usr/share/nginx/html
      state: absent

  

  